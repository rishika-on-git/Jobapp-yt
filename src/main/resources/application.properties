spring.application.name=jobapp

# Enables the H2 database web UI
spring.h2.console.enabled=true

# Creates an H2 database named 'test' that lives only in memory
# and is deleted when the application stops
spring.datasource.url=jdbc:h2:mem:test

#Generate database schema (tables) from my entity classes.
spring.jpa.generate-ddl=true

# Automatically create and drop the database schema at startup and shutdown.
#It tells Hibernate what to do with tables when the application starts and stops.
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
